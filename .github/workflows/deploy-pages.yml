name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: src/msfabric_solution_catalog_web

      - name: Generate content
        run: npm run generate-content
        working-directory: src/msfabric_solution_catalog_web

      - name: Build Next.js
        run: npm run build
        working-directory: src/msfabric_solution_catalog_web
        env:
          NEXT_PUBLIC_BASE_PATH: /msfabric-solution-catalog

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src/msfabric_solution_catalog_web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
