name: Deploy

# DEPRECATED: This is a legacy Azure deployment pipeline.
# The primary deployment is now via deploy-pages.yml (GitHub Pages).
# This workflow is kept for manual dispatch only (workflow_dispatch).
# It requires Azure secrets (WEBSITE_STORAGE_CONN_STRING, APPINSIGHTS_APP_ID, APPINSIGHTS_API_KEY)
# that are not configured for this fork.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: "🔄 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Bootstrap CI Environment"
        run: contrib/bootstrap-ci.sh

      - name: "🚀 Deploy Projects"
        env:
          WEBSITE_STORAGE_CONN_STRING: ${{ secrets.WEBSITE_STORAGE_CONN_STRING }}
          APPINSIGHTS_APP_ID: ${{ secrets.APPINSIGHTS_APP_ID }}
          APPINSIGHTS_API_KEY: ${{ secrets.APPINSIGHTS_API_KEY }}
        run: npx nx run-many -t deploy --parallel=3 --output-style=stream
